<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportar un Problema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="card p-4 shadow">
        <h2>Reportar Nuevo Ticket de Soporte</h2>
        <p class="text-muted">Por favor, detalla el problema que estás experimentando.</p>
        <hr>
        
        <form method="POST">
            {% csrf_token %} {{ form.as_p }} <button type="submit" class="btn btn-primary mt-3">Enviar Ticket</button>
        </form>
    </div>

</body>
</html>
