<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Created Successfully!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container" style="max-width: 500px;">
        <div class="card p-5 shadow text-center border-0 rounded-4">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            
            <h1 class="fw-bold text-dark mb-2">Success Ticket!</h1>
            <p class="text-muted fs-5 mb-4">The ticket has been successfully registered. Our technical support team will review it as soon as possible.</p>
            
            <hr class="my-4 text-secondary opacity-25">
            
            <div class="d-grid gap-2">
                <a href="{% url 'create_ticket' %}" class="btn btn-primary btn-lg rounded-3">
                    <i class="bi bi-plus-circle me-2"></i>Report another issue
                </a>
                <a href="#" class="btn btn-outline-secondary btn-lg rounded-3">
                    <i class="bi bi-house me-2"></i>Return to Home
                </a>
            </div>
        </div>
    </div>

</body>
</html>
